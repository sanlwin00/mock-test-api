<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Back in a moment — Citizenship Academy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .emoji { font-size: 3.5rem; margin-bottom: 1.25rem; }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.75rem;
    }
    p {
      color: #555;
      line-height: 1.7;
      font-size: 0.975rem;
    }
    .highlight {
      display: inline-block;
      margin-top: 1.5rem;
      background: #eef2ff;
      color: #4f46e5;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🛠️</div>
    <h1>We'll be right back!</h1>
    <p>
      Our team is busy making things better for you behind the scenes.
      We promise it's worth the wait — probably. 😄
    </p>
    <p style="margin-top: 1rem;">
      Grab a coffee, take a stretch break, and check back in a few minutes.
      We won't be long!
    </p>
    <span class="highlight">⚡ Maintenance in progress</span>
    <div class="footer">Citizenship Academy &mdash; ccacademy.ca</div>
  </div>
</body>
</html>
